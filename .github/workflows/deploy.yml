# El despliegue real se ejecuta desde el VPS mediante deploy-local.sh.
# GitHub Actions ya no publica la web en producción.
# Este workflow sirve únicamente como comprobación manual y no destructiva.
name: Deploy disabled - VPS first

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  repository-check:
    name: Comprobaciones seguras del repositorio
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Ejecutar tests
        run: npm test

      - name: Comprobar sintaxis de JavaScript versionado
        shell: bash
        run: |
          while IFS= read -r -d '' file; do
            node --check "$file"
          done < <(git ls-files -z -- '*.js' '*.mjs' '*.cjs')

      - name: Comprobar errores de whitespace en el diff
        run: git diff --check
