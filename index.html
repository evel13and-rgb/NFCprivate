<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Páramo Literario · Frase aleatoria</title>
  <meta name="description" content="Cada vez que abras esta página te mostrará una frase literaria aleatoria." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@500;600;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body data-mode="day">
  <main class="wrap">
    <section
      class="quote-flow"
      id="quote-panel"
      aria-live="polite"
    >
      <div id="quote-card">
        <h1>Páramo Literario</h1>
        <div class="quote-mark" aria-hidden="true">“</div>
        <div class="quote-rule quote-rule--top" aria-hidden="true"><span></span></div>
        <blockquote id="quote">…</blockquote>
        <div class="quote-rule quote-rule--short" aria-hidden="true"><span></span></div>
        <div class="author" id="author" aria-live="polite">
          <div class="author-line">
            <span class="meta-prefix" aria-hidden="true">—</span>
            <span
              class="meta-link meta-author"
              id="author-name"
              data-author-id=""
            ></span>
          </div>
          <span
            class="meta-link meta-work"
            id="author-work"
            data-work-id=""
          ></span>
        </div>
        <div class="watermark" aria-hidden="true">paramoliterario.com</div>
        <div class="quote-actions" aria-label="Acciones de la frase">
          <button
            id="listen-voice-btn"
            type="button"
            class="quote-action-button"
            aria-label="Escuchar voz"
          >
            <span class="quote-action-icon" aria-hidden="true">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M11 5 6 9H3v6h3l5 4V5Z"></path>
                <path d="M15.5 8.5a5 5 0 0 1 0 7"></path>
                <path d="M18.5 5.5a9 9 0 0 1 0 13"></path>
              </svg>
            </span>
            <span>Escuchar voz</span>
          </button>
          <span class="quote-actions__divider" aria-hidden="true"></span>
          <button
            id="share-image-btn"
            type="button"
            class="quote-action-button"
            aria-label="Compartir imagen"
            aria-description="Generar imagen compartible de este fragmento"
          >
            <span class="quote-action-icon" aria-hidden="true">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <circle cx="18" cy="5" r="3"></circle>
                <circle cx="6" cy="12" r="3"></circle>
                <circle cx="18" cy="19" r="3"></circle>
                <path d="M8.59 13.51 15.42 17.49"></path>
                <path d="M15.41 6.51 8.59 10.49"></path>
              </svg>
            </span>
            <span>Compartir imagen</span>
          </button>
        </div>
      </div>
      <p class="tiny" id="share-feedback" hidden aria-live="polite"></p>
      <p class="tiny" id="quote-message" hidden aria-live="polite"></p>
    </section>
  </main>

  <div
    class="modal is-hidden"
    id="author-modal"
    role="dialog"
    aria-modal="true"
    aria-labelledby="author-modal-title"
  >
    <div class="modal__overlay" data-modal-dismiss="author"></div>
    <div class="modal__dialog">
      <button class="modal__close" type="button" aria-label="Cerrar">×</button>
      <div class="modal__header">
        <h2 class="modal__title" id="author-modal-title"></h2>
        <p class="modal__subtitle">Sobre el autor</p>
      </div>
      <div class="modal__content">
        <div class="author-content" aria-live="polite"></div>
      </div>
    </div>
  </div>

  <div
    class="modal is-hidden"
    id="work-modal"
    role="dialog"
    aria-modal="true"
    aria-labelledby="work-modal-title"
  >
    <div class="modal__overlay" data-modal-dismiss="work"></div>
    <div class="modal__dialog">
      <button class="modal__close" type="button" aria-label="Cerrar">×</button>
      <div class="modal__header">
        <h2 class="modal__title" id="work-modal-title"></h2>
        <p class="modal__subtitle">Sobre la obra</p>
      </div>
      <div class="modal__content">
        <div class="work-content" aria-live="polite"></div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script type="module" src="script.js"></script>
</body>
</html>
